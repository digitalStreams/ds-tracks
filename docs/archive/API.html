<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<label for="API">Choose a API Option:</label>

<select name="api" id="api">
   <option value=""> </option>
  <option value="users">Get all user Lists </option>
  <option value="by_users">Get the Audio By Distinict Users</option>
  <option value="by_user_all">Get a list of all uploads made by a user selected by user name</option>
  <option value="track_list">Get Track List By Session Key</option>
</select>
<br>
<br>  
<div id='by_user'>
</div>

<div id='form'>
 <form action="" method="post">
  <label for="fname">Enter User name:e.g Peter</label><br>
  <input type="text" id="u_name" name="u_name" ><br><br>
  <input type="submit" id="submit" value="Submit">
</form> 
</div>

<div id='trackform'>
 <form action="" method="post">
  <label for="fname">Enter Track list name e.g Peter-221002-1435</label><br>
  <input type="text" id="t_name" name="t_name" ><br><br>
  <input type="submit" id="t_submit" value="Submit">
</form> 
</div>
  <pre id="response" style=
        "color:green; font-size: 20px; font-weight: bold;">
    </pre>
<script type="text/javascript">
  $("#form").css("display", "none");  
    $("#trackform").css("display", "none"); 
$("#api").change(function() {
   $('#response').text('');
    //get the selected value

    var selectedValue = this.value;
    if(selectedValue=='users'){
    //make the ajax call
     $("#form").css("display", "none"); 
     $("#trackform").css("display", "none");
    $.ajax({
        url: 'json.php',
        type: 'POST',
        data: {option : selectedValue},
        success: function(data) {
            console.log(data);
            $('#response').text(data);
             $('#by_user').hide();
        }
    });
  }
  else if (selectedValue=='by_users'){
     $('#response').text('');
     $("#form").css("display", "none"); 
     $("#trackform").css("display", "none");
     $('#by_user').show();
    $.ajax({
        url: 'json.php',
        type: 'POST',
        data: {option : selectedValue},
        success: function(data) {
            console.log(data);
            $('#by_user').html(data);
           // 
           $("#Users_id").change(function() {
    //get the selected value
              var selectedValue = this.value;
              alert();
              //make the ajax call
              $.ajax({
                  url: 'json.php',
                  type: 'POST',
                  data: {option : selectedValue},
                  success: function(data) {
                      console.log(data);
                      $('#response').text(data);
                      }
                  });
                })
           // 

        }
    });
    }else if(selectedValue=='by_user_all'){
       $('#response').text('');
        $('#by_user').hide();
        $("#trackform").css("display", "none");
         $("#form").css("display", "block");
        
          $('#submit').click(function(e){
            e.preventDefault();
            var u_name= $("#u_name").val();

            $.ajax({
            url: 'json.php',
            type: 'POST',
            data: {u_name : u_name},
            success: function(data) {
                console.log(data);
                $('#response').text(data);
  
                }
            });


          })
    }else if(selectedValue=='track_list'){
      alert();
      $('#response').text('');
        $('#by_user').hide();
         $("#form").css("display", "none");
         $("#trackform").css("display", "block"); 

         $('#t_submit').click(function(e){
            e.preventDefault();
            var t_name= $("#t_name").val();

            $.ajax({
            url: 'json.php',
            type: 'POST',
            data: {t_name : t_name},
            success: function(data) {
                console.log(data);
                $('#response').text(data);
  
                }
            });


          })
    }

});
</script>
